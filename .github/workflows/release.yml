name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs reads the git tag
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/swiss-public-transport-mcp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-registry:
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Stamp version into server.json from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python - <<EOF
          import json
          with open("server.json") as f:
              d = json.load(f)
          d["version"] = "$VERSION"
          d["packages"][0]["version"] = "$VERSION"
          with open("server.json", "w") as f:
              json.dump(d, f, indent=2)
              f.write("\n")
          EOF
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher
          chmod +x mcp-publisher
      - name: Login to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
